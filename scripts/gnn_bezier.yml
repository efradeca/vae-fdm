# GNN encoder for shell form-finding
seed: 91
generator:
  name: "bezier_symmetric_double"
  bounds: "saddle"
  num_uv: 10
  size: 10.0
  num_points: 4
  lerp_factor: 0.5
fdm:
  load: -0.5
encoder:
  encoder_type: "gnn"
  shift: 0.0
  hidden_layer_size: 128
  hidden_layer_num: 4
  activation_fn_name: "elu"
  final_activation_fn_name: "softplus"
decoder:
  include_params_xl: True
  hidden_layer_size: 256
  hidden_layer_num: 3
  activation_fn_name: "elu"
loss:
  shape:
    include: True
    weight: 1.0
  residual:
    include: True
    weight: 1.0
optimizer:
  name: "adam"
  learning_rate: 3.0e-5
  clip_norm: 0.0
training:
  steps: 10000
  batch_size: 64
